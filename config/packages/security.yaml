security:
    # Configuration du hachage des mots de passe
    password_hashers:
        App\Entity\User: 'auto'

    # Configuration du fournisseur d'utilisateurs
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Configuration des Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall pour la route de connexion. Il gère la création des tokens.
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login # La route surveillée
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Firewall principal gere la verification des tokens.
        api:
            pattern: ^/api
            stateless: true
            jwt:
                # Le token sera extrait de l'en-tête Authorization de la requête.
                authorization_header:
                    enabled: true
                    prefix: Bearer

    # Règles de circulation
    access_control:
        # La route de connexion doit être publique
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        # La route d'inscription doit être publique
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        # Toutes les routes nécessitent une authentification
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
