nelmio_cors:
  defaults:
    # On ne définit rien par défaut, on configure tout par chemin.
    allow_origin: []
    allow_methods: []
    allow_headers: []
    expose_headers: []
    max_age: 0
  paths:
    # Cette règle ne s'applique qu'aux routes commençant par /api/
    '^/api/':
      # On autorise UNIQUEMENT l'origine de notre serveur de dev React.
      allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
      allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
      allow_headers: ['Content-Type', 'Authorization']
      max_age: 3600
    