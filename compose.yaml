# Variables d'environnement communes injectées dans le service PHP
x-common-env: &common-env
  APP_ENV: ${APP_ENV:-dev}
  APP_SECRET: ${APP_SECRET}
  APP_DEBUG: ${APP_DEBUG:-0}
  DEFAULT_URI: ${DEFAULT_URI:-http://localhost}
  CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:5173}
  DATABASE_URL: ${DATABASE_URL}
  MONGODB_URL: ${MONGODB_URL}
  MONGODB_DB: ${MONGODB_DB:-plantoshop_db}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-%kernel.project_dir%/config/jwt/private.pem}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-%kernel.project_dir%/config/jwt/public.pem}
  JWT_PASSPHRASE: ${JWT_PASSPHRASE}
  MAILER_DSN: ${MAILER_DSN:-smtp://mailer:1025}
  MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-sync://}

services:

  # --- PHP-FPM ---
  php:
    container_name: plantPHP
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: app
        uid: 1000
    restart: always
    volumes:
      - .:/var/www/html
      - php_fpm_socket:/var/run/php
    environment: *common-env
    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_started

  # --- Caddy (reverse proxy + file server) ---
  caddy:
    image: caddy:2.7.5-alpine
    container_name: plantCaddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/server/Caddyfile:/etc/caddy/Caddyfile
      - .:/var/www/html
      - php_fpm_socket:/var/run/php
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - php

  # --- PostgreSQL ---
  database:
    container_name: plantDB_PGSQL
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plantodb}
      POSTGRES_USER: ${POSTGRES_USER:-plantuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-plantodb}", "-U", "${POSTGRES_USER:-plantuser}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- MongoDB ---
  mongodb:
    container_name: plantDB_Mongo
    image: mongo:6.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-plantoshop_db}
    volumes:
      - mongo_data:/data/db

volumes:
  php_fpm_socket:
  postgres_data:
  mongo_data:
  caddy_data:
  caddy_config: