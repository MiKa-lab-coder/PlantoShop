# Overrides de développement — chargé automatiquement par Docker Compose en local.
# Ne pas utiliser en production.

services:

  # Expose les ports DB pour les outils locaux (DBeaver, Compass, etc.)
  database:
    ports:
      - '5432:5432'

  mongodb:
    ports:
      - '27017:27017'

  # Mailpit — intercepte les emails sortants en dev
  mailer:
    image: axllent/mailpit
    container_name: plantMailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # Node — Vite dev server pour le frontend React
  node:
    container_name: plantNode
    image: node:20-alpine
    user: node
    working_dir: /var/www/html/react
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/react/node_modules
    ports:
      - '5173:5173'
    # Lance npm install si besoin puis démarre Vite en mode réseau (accessible depuis l'hôte)
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  node_modules: