; Configuration PHP pour l'environnement de production

; --- Limites de performance et de mémoire ---
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; --- Erreurs : jamais affichées, toujours loguées ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; --- Téléchargement de fichiers ---
upload_max_filesize = 10M
post_max_size = 12M

; --- OPcache (optimisé pour prod : pas de rechargement automatique) ---
opcache.enable = 1
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.memory_consumption = 256
opcache.save_comments = 1
; En prod, ne pas revalider les timestamps à chaque requête
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0