# Environnement de production — fichier unique, autonome.
# Utilisé par Coolify : pointer ce fichier dans "Docker Compose Location".
# Variables d'environnement à définir dans Coolify (pas de .env en prod).

x-common-env: &common-env
  APP_ENV: prod
  APP_SECRET: ${APP_SECRET}
  APP_DEBUG: "0"
  DEFAULT_URI: ${DEFAULT_URI}
  CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
  DATABASE_URL: ${DATABASE_URL}
  MONGODB_URL: ${MONGODB_URL}
  MONGODB_DB: ${MONGODB_DB:-plantoshop_db}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-%kernel.project_dir%/config/jwt/private.pem}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-%kernel.project_dir%/config/jwt/public.pem}
  JWT_PASSPHRASE: ${JWT_PASSPHRASE}
  MAILER_DSN: ${MAILER_DSN:-null://}
  MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-sync://}

services:

  # --- Build React (service one-shot) ---
  # S'exécute une seule fois, construit react/dist/, puis se termine.
  react_build:
    image: node:20-alpine
    container_name: plantReactBuild
    working_dir: /app/react
    volumes:
      - .:/app
    environment:
      VITE_API_URL: ${VITE_API_URL}
    command: sh -c "npm ci && npm run build"
    restart: "no"

  # --- PHP-FPM ---
  php:
    container_name: plantPHP
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: app
        uid: 1000
    restart: always
    volumes:
      - .:/var/www/html
      - php_fpm_socket:/var/run/php
      - ./docker/php/php.prod.ini:/usr/local/etc/php/conf.d/zz-app.ini
    environment: *common-env
    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_started

  # --- Caddy ---
  # Traefik (Coolify) gère SSL/TLS en amont.
  # Caddy sert les fichiers statiques React et proxifie /api/* vers PHP-FPM.
  caddy:
    image: caddy:2.7.5-alpine
    container_name: plantCaddy
    restart: unless-stopped
    volumes:
      - ./docker/server/Caddyfile.prod:/etc/caddy/Caddyfile
      - .:/var/www/html
      - php_fpm_socket:/var/run/php
      - caddy_data:/data
      - caddy_config:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plantoshop.rule=Host(`plantoshop.mika-lab.ovh`)"
      - "traefik.http.routers.plantoshop.tls=true"
      - "traefik.http.routers.plantoshop.tls.certresolver=letsencrypt"
      - "traefik.http.services.plantoshop.loadbalancer.server.port=80"
    networks:
      - default
      - coolify
    depends_on:
      react_build:
        condition: service_completed_successfully
      php:
        condition: service_started

  # --- PostgreSQL ---
  database:
    container_name: plantDB_PGSQL
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plantodb}
      POSTGRES_USER: ${POSTGRES_USER:-plantuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-plantodb}", "-U", "${POSTGRES_USER:-plantuser}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- MongoDB ---
  mongodb:
    container_name: plantDB_Mongo
    image: mongo:6.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-plantoshop_db}
    volumes:
      - mongo_data:/data/db

volumes:
  php_fpm_socket:
  postgres_data:
  mongo_data:
  caddy_data:
  caddy_config:

networks:
  coolify:
    external: true
